<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>BursRadar — İzmir Özel Okul Burs Sınavları</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css?v=18" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.min.js"></script>
</head>
<body>
<div id="root"></div>

<script src="data.js?v=3"></script>
<script src="supabase-client.js?v=23"></script>
<script type="text/babel" src="icons.jsx?v=4"></script>
<script type="text/babel" src="tweaks-panel.jsx?v=3"></script>
<script type="text/babel" src="components.jsx?v=7"></script>
<script type="text/babel" src="screens.jsx?v=31"></script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const THEME_STORAGE_KEY = 'bursradar:theme';
const THEME_VALUES = ['light', 'dark'];

function readStoredTheme() {
  try {
    const v = localStorage.getItem(THEME_STORAGE_KEY);
    return THEME_VALUES.includes(v) ? v : 'light';
  } catch (_) { return 'light'; }
}

function persistTheme(mode) {
  try { localStorage.setItem(THEME_STORAGE_KEY, mode); } catch (_) {}
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "showRadar": true,
  "density": "compact"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = useState({ tab: 'home', overlay: null, params: null });
  const [dataVersion, setDataVersion] = useState(0);
  const [fav, setFav] = useState(['e2', 'e4']);
  const [rem, setRem] = useState(['e1', 'e3']);
  const [toast, setToast] = useState(null);
  const [session, setSession] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [profile, setProfile] = useState(null);
  const [profileLoading, setProfileLoading] = useState(false);
  const [realtimeVersion, setRealtimeVersion] = useState(0);
  const [theme, setThemeState] = useState(readStoredTheme);

  const setTheme = useCallback((mode) => {
    if (!THEME_VALUES.includes(mode)) return;
    setThemeState(mode);
    persistTheme(mode);
    setTweak('theme', mode);
  }, [setTweak]);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  useEffect(() => {
    let mounted = true;
    window.BursRadarSupabase.getSession()
      .then(nextSession => { if (mounted) setSession(nextSession); })
      .finally(() => { if (mounted) setAuthLoading(false); });
    return () => { mounted = false; };
  }, []);

  useEffect(() => {
    let mounted = true;
    if (!session?.access_token) {
      setProfile(null);
      setProfileLoading(false);
      return () => { mounted = false; };
    }

    setProfileLoading(true);
    window.BursRadarSupabase.getCurrentUserProfile(session)
      .then(nextProfile => { if (mounted) setProfile(nextProfile); })
      .catch(err => {
        console.warn('[BursRadar] Kullanıcı rol profili yüklenemedi.', err.message);
        if (mounted) setProfile(null);
      })
      .finally(() => { if (mounted) setProfileLoading(false); });

    return () => { mounted = false; };
  }, [session?.access_token]);

  function syncPlanDefaults() {
    const ids = window.EXAMS.map(e => e.id);
    if (ids.length === 0) return;

    setRem(current => current.some(id => ids.includes(id)) ? current : ids.slice(0, Math.min(2, ids.length)));
    setFav(current => current.some(id => ids.includes(id)) ? current : ids.slice(1, Math.min(3, ids.length)));
  }

  useEffect(() => {
    function handleDataReady() {
      syncPlanDefaults();
      setDataVersion(v => v + 1);
    }
    window.addEventListener('bursradar:data-ready', handleDataReady);
    if (window.BURSRADAR_DATA_READY) handleDataReady();
    return () => window.removeEventListener('bursradar:data-ready', handleDataReady);
  }, []);

  useEffect(() => {
    if (!window.BursRadarSupabase?.startRealtime) return undefined;
    return window.BursRadarSupabase.startRealtime({
      session,
      profile,
      onPublicDataChange: payload => {
        setDataVersion(v => v + 1);
        setRealtimeVersion(v => v + 1);
        showToast(payload?.table === 'exams' ? 'Sınav bilgileri güncellendi' : 'Okul bilgileri güncellendi');
      },
      onPrivateDataChange: () => {
        setRealtimeVersion(v => v + 1);
        syncPlanMarks(session);
      },
      onProfileChange: () => {
        if (!session?.access_token) return;
        window.BursRadarSupabase.getCurrentUserProfile(session)
          .then(nextProfile => {
            setProfile(nextProfile);
            setRealtimeVersion(v => v + 1);
            showToast('Hesap yetkileri güncellendi');
          })
          .catch(err => console.warn('[BursRadar] Realtime rol yenileme hatası.', err.message));
      },
    });
  }, [session?.access_token, session?.user?.id, profile?.role, profile?.school_id]);

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(null), 2000);
  }

  async function syncPlanMarks(nextSession = session) {
    if (!nextSession?.access_token) return;
    try {
      const rows = await window.BursRadarSupabase.getUserExamMarks(nextSession);
      setFav(rows.filter(row => row.is_favorite).map(row => row.exam_id));
      setRem(rows.filter(row => row.has_reminder).map(row => row.exam_id));
    } catch (err) {
      console.warn('[BursRadar] Plan işaretleri yüklenemedi.', err.message);
    }
  }

  useEffect(() => {
    syncPlanMarks(session);
  }, [session?.access_token, dataVersion]);

  function toggleFav(id) {
    setFav(f => {
      const has = f.includes(id);
      const next = has ? f.filter(x => x !== id) : [...f, id];
      showToast(has ? 'Favorilerden \u00e7\u0131kar\u0131ld\u0131' : 'Favorilere eklendi');
      if (session?.access_token) {
        window.BursRadarSupabase.setUserExamMark(id, {
          isFavorite: !has,
          hasReminder: rem.includes(id),
        }, session).catch(err => console.warn('[BursRadar] Favori kaydedilemedi.', err.message));
      }
      return next;
    });
  }
  function toggleRem(id) {
    setRem(r => {
      const has = r.includes(id);
      const next = has ? r.filter(x => x !== id) : [...r, id];
      showToast(has ? 'Hat\u0131rlatma kald\u0131r\u0131ld\u0131' : 'Hat\u0131rlatma kuruldu');
      if (session?.access_token) {
        window.BursRadarSupabase.setUserExamMark(id, {
          isFavorite: fav.includes(id),
          hasReminder: !has,
        }, session).catch(err => console.warn('[BursRadar] Hatırlatma kaydedilemedi.', err.message));
      }
      return next;
    });
  }

  async function signIn(email, password) {
    const nextSession = await window.BursRadarSupabase.signIn(email, password);
    setSession(nextSession);
    showToast('Oturum açıldı');
    return nextSession;
  }

  function signInWithGoogle() {
    window.BursRadarSupabase.signInWithGoogle();
  }

  async function signUp(email, password) {
    const nextSession = await window.BursRadarSupabase.signUp(email, password);
    setSession(nextSession);
    showToast(nextSession?.user ? 'Hesap oluşturuldu' : 'Kayıt isteği alındı');
    return nextSession;
  }

  async function resendSignupConfirmation(email) {
    await window.BursRadarSupabase.resendSignupConfirmation(email);
    showToast('Doğrulama e-postası tekrar gönderildi');
  }

  async function resetPassword(email) {
    await window.BursRadarSupabase.resetPassword(email);
    showToast('Şifre sıfırlama e-postası gönderildi');
  }

  async function signOut() {
    await window.BursRadarSupabase.signOut();
    setSession(null);
    setProfile(null);
    setFav([]);
    setRem([]);
    showToast('Oturum kapatıldı');
    setRoute({ tab: 'account', overlay: null, params: null });
  }

  function go(target, params) {
    if (target === 'plan' && !session?.user) {
      setRoute({ tab: 'account', overlay: null, params: { returnTo: 'plan' } });
      return;
    }
    if (target === 'exam' || target === 'school') {
      setRoute(r => ({ ...r, overlay: target, params }));
      // scroll to top
      setTimeout(() => {
        const s = document.querySelector('.screen');
        if (s) s.scrollTop = 0;
      }, 10);
    } else {
      setRoute({ tab: target, overlay: null, params: params || null });
      setTimeout(() => {
        const s = document.querySelector('.screen');
        if (s) s.scrollTop = 0;
      }, 10);
    }
  }

  const auth = {
    user: session?.user || null,
    profile,
    profileLoading,
    loading: authLoading,
    signIn,
    signInWithGoogle,
    signUp,
    resendSignupConfirmation,
    resetPassword,
    signOut,
    deleteAccount: () => window.BursRadarSupabase.deleteAccount(session),
    getUserExamMarks: () => window.BursRadarSupabase.getUserExamMarks(session),
    setUserExamMark: (examId, values) => window.BursRadarSupabase.setUserExamMark(examId, values, session),
    getSchoolPackages: schoolId => window.BursRadarSupabase.getSchoolPackages(schoolId, session),
    getSchoolPackageRequests: schoolId => window.BursRadarSupabase.getSchoolPackageRequests(schoolId, session),
    getSchoolExams: schoolId => window.BursRadarSupabase.getSchoolExams(schoolId, session),
    getAdminPackageRequests: () => window.BursRadarSupabase.getAdminPackageRequests(session),
    getAdminSchoolPackages: () => window.BursRadarSupabase.getAdminSchoolPackages(session),
    getAdminUserProfiles: () => window.BursRadarSupabase.getAdminUserProfiles(session),
    findAdminUserByEmail: email => window.BursRadarSupabase.findAdminUserByEmail(email, session),
    updateAdminUserRole: payload => window.BursRadarSupabase.updateAdminUserRole(payload, session),
    getAdminSchools: () => window.BursRadarSupabase.getAdminSchools(session),
    approvePackageRequest: payload => window.BursRadarSupabase.approvePackageRequest(payload, session),
    rejectPackageRequest: payload => window.BursRadarSupabase.rejectPackageRequest(payload, session),
    deactivateSchoolPackage: payload => window.BursRadarSupabase.deactivateSchoolPackage(payload, session),
    assignSchoolPackage: payload => window.BursRadarSupabase.assignSchoolPackage(payload, session),
    updateSchoolPackageExpiry: payload => window.BursRadarSupabase.updateSchoolPackageExpiry(payload, session),
    restrictUserProfile: payload => window.BursRadarSupabase.restrictUserProfile(payload, session),
    updateSchoolProfile: (schoolId, values) => window.BursRadarSupabase.updateSchoolProfile(schoolId, values, session),
    updateSchoolTrust: (schoolId, values) => window.BursRadarSupabase.updateSchoolTrust(schoolId, values, session),
    updateRegistrationTrust: (schoolId, values) => window.BursRadarSupabase.updateRegistrationTrust(schoolId, values, session),
    updateExamTrust: (examId, values) => window.BursRadarSupabase.updateExamTrust(examId, values, session),
    uploadSchoolLogo: (schoolId, file) => window.BursRadarSupabase.uploadSchoolLogo(schoolId, file, session),
    createSchoolExam: (schoolId, values) => window.BursRadarSupabase.createSchoolExam(schoolId, values, session),
    deleteSchoolExam: examId => window.BursRadarSupabase.deleteSchoolExam(examId, session),
    createPackageRequest: payload => window.BursRadarSupabase.createPackageRequest(payload, session),
    notifyPackageRequest: requestId => window.BursRadarSupabase.notifyPackageRequest(requestId, session),
  };
  const screenProps = { go, fav, rem, toggleFav, toggleRem, auth, realtimeVersion, theme, setTheme };

  let content;
  if (route.overlay === 'exam') {
    content = <ExamDetailScreen id={route.params.id} {...screenProps} />;
  } else if (route.overlay === 'school') {
    content = <SchoolDetailScreen id={route.params.id} {...screenProps} />;
  } else if (route.tab === 'home') {
    content = <HomeScreen {...screenProps} />;
  } else if (route.tab === 'exams') {
    content = <ExamsScreen params={route.params} {...screenProps} />;
  } else if (route.tab === 'plan') {
    content = <PlanScreen {...screenProps} />;
  } else if (route.tab === 'schools') {
    content = <SchoolsScreen {...screenProps} />;
  } else if (route.tab === 'account') {
    content = <AccountScreen params={route.params} {...screenProps} />;
  } else if (route.tab === 'admin' && auth.profile?.role === 'admin') {
    content = <AdminPackagesScreen {...screenProps} />;
  }

  const tabs = [
    { id: 'home', label: 'Ana Sayfa', icon: 'home' },
    { id: 'exams', label: 'Sınavlar', icon: 'list' },
    { id: 'plan', label: 'Planım', icon: 'bookmark' },
    { id: 'schools', label: 'Okullar', icon: 'school' },
    { id: 'account', label: 'Hesap', icon: 'user' },
    ...(auth.profile?.role === 'admin' ? [{ id: 'admin', label: 'Admin', icon: 'shield' }] : []),
  ];

  return (
    <div className="phone">
      <div className="screen" key={route.tab + (route.overlay || '') + (route.params?.id || '') + dataVersion}>
        {content}
      </div>

      <div className="tabbar">
        {tabs.map(t => (
          <button key={t.id} className={'tab ' + (route.tab === t.id && !route.overlay ? 'active' : '')}
                  onClick={() => go(t.id)}>
            <Icon name={t.icon} />
            <span>{t.label}</span>
            <div className="tab-dot" />
          </button>
        ))}
      </div>

      {toast && <Toast msg={toast} />}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Görünüm">
          <TweakRadio label="Tema" value={theme}
                      options={[{ value: 'light', label: 'Açık' }, { value: 'dark', label: 'Radar Koyu' }]}
                      onChange={v => setTheme(v)} />
          <TweakRadio label="Yoğunluk" value={tweaks.density}
                      options={[{ value: 'cozy', label: 'Rahat' }, { value: 'compact', label: 'Sıkı' }]}
                      onChange={v => setTweak('density', v)} />
        </TweakSection>
        <TweakSection label="Hızlı Eylemler">
          <TweakButton label="Tüm sınavları açık göster" onClick={() => go('exams')} />
          <TweakButton label="İlk sınava git (e1)" onClick={() => go('exam', { id: 'e1' })} />
          <TweakButton label="Okul detayına git (s1)" onClick={() => go('school', { id: 's1' })} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
