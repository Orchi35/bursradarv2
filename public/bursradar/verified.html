<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BursRadar — Hesap Doğrulandı</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0f1f3d;
      display: flex; align-items: center; justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 64px; height: 64px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
    }
    h1 { font-size: 22px; color: #111827; margin-bottom: 10px; }
    p  { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: #1A3A6B;
      color: #ffffff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 12px;
      width: 100%;
    }
    .brand {
      margin-top: 28px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Hesabınız Doğrulandı!</h1>
    <p>E-posta adresiniz başarıyla doğrulandı. BursRadar uygulamasına dönebilirsiniz.</p>
    <a href="bursradar://" class="btn">Uygulamayı Aç</a>
    <div class="brand">BursRadar · İzmir Özel Okul Burs Platformu</div>
  </div>
  <script>
    // Otomatik olarak uygulamayı açmayı dene
    setTimeout(function() {
      window.location.href = 'bursradar://';
    }, 800);
  </script>
</body>
</html>
